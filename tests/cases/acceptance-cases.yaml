schema_version: 1
default_language: "Chinese diagnostics, English manuscript text"
cases:
  - id: iclr-abstract-from-chinese-notes
    skill: top-cs-writing
    route: {venue: iclr, year: 2026, paper_type: empirical, section: [abstract], language: zh-to-en}
    prompt: "根据中文实验笔记起草 ICLR 摘要；笔记缺少方差和运行次数。"
    must_include: ["Central argument", "Claim–evidence table", "[DETAIL NEEDED]", "Draft"]
    must_not_include: ["invented variance", "invented run count"]
  - id: www-first-page-relevance
    skill: top-cs-polishing
    route: {venue: www, year: 2026, paper_type: systems, section: [introduction], language: en}
    prompt: "重构引言，使第一页面向 WWW research track 清楚说明 Web relevance。"
    must_include: ["Revised text", "Web relevance", "Material changes"]
    must_not_include: ["Companion style asserted as main-track policy"]
  - id: icml-experiment-audit
    skill: top-cs-reviewer
    route: {venue: icml, manuscript_scope: full-paper, review_mode: claim-audit}
    prompt: "审查实验是否支持效率、稳定性和性能三个主要 claim。"
    must_include: ["Technical", "Experimental/reproducibility", "Venue/scope", "Prioritized risks"]
    must_not_include: ["unrequested fabricated score"]
  - id: point-by-point-response
    skill: top-cs-response
    route: {venue: iclr, task_mode: draft, response_phase: author-reviewer-discussion, decision_type: unclear, language: en}
    prompt: "将三位 reviewer 的重复质疑合并为问题矩阵并逐点回复；没有新增实验。"
    must_include: ["Issue matrix", "Point-by-point response", "Revision ledger", "cannot complete"]
    must_not_include: ["claim that new experiments were completed"]
  - id: unsupported-venue-fallback
    skill: top-cs-writing
    route: {venue: generic, year: 2026, paper_type: theoretical, section: [introduction], language: en}
    prompt: "为未内置的会议起草引言。"
    must_include: ["generic", "verify the current official guide"]
    must_not_include: ["invented page limit", "invented rebuttal policy"]
  - id: same-material-venue-differentiation
    skill: top-cs-writing
    prompt: "用同一份研究材料分别规划 WWW Research、ICLR 和 ICML 引言。"
    must_include:
      - "WWW first-page Web relevance"
      - "ICLR main-paper self-containment"
      - "ICML explicit contribution and review-dimension separation"
    must_not_include: ["surface synonym-only differentiation", "WWW Industry rules", "WWW Short rules"]
  - id: historical-review-policy-boundary
    skill: top-cs-reviewer
    route: {venue: icml, manuscript_scope: full-paper, review_mode: reviewer-report}
    prompt: "使用公开评审模式审查 ICML 稿件。"
    must_include: ["ICML 2026 official dimensions", "historical ICLR behavioral evidence boundary"]
    must_not_include: ["historical ICLR behavior presented as ICML policy"]
  - id: planned-work-not-completed
    skill: top-cs-response
    route: {venue: iclr, task_mode: draft, response_phase: author-reviewer-discussion, decision_type: unclear, language: en}
    prompt: "作者计划补实验，但目前没有结果，起草回复。"
    must_include: ["planned", "AUTHOR_INPUT_NEEDED", "claim boundary"]
    must_not_include: ["experiment completed", "invented result", "invented manuscript location"]
  - id: writing-full-paper-argument-graph
    skill: top-cs-writing
    route: {venue: icml, year: 2026, paper_type: empirical, section: [introduction, experiments, conclusion], language: en, artifact_scope: full-manuscript}
    prompt: "检查全文三个章节中的主要 claim 是否一致，并规划图表位置。"
    must_include: ["Argument graph", "Claim–evidence", "Artifact and appendix plan"]
    must_not_include: ["invented figure", "invented citation"]
  - id: writing-theoretical-proof-boundary
    skill: top-cs-writing
    route: {venue: iclr, year: 2026, paper_type: theoretical, section: [method], language: en}
    prompt: "根据给定定理和不完整证明起草方法章节。"
    must_include: ["assumptions", "proof", "[EVIDENCE NEEDED]"]
    must_not_include: ["proof is complete"]
  - id: polishing-light-edit
    skill: top-cs-polishing
    route: {venue: generic, paper_type: empirical, section: [abstract], language: en, revision_mode: light-edit}
    prompt: "只做轻量语言修改，不重排论证。"
    must_include: ["Revised text", "Revision ledger", "light-edit"]
    must_not_include: ["new result", "new contribution"]
  - id: polishing-compression
    skill: top-cs-polishing
    route: {venue: icml, paper_type: empirical, section: [introduction], language: en, revision_mode: compression}
    prompt: "压缩引言，同时保留所有数字、引用关系和 claim boundary。"
    must_include: ["Revision ledger", "Verification status", "claim-strength"]
    must_not_include: ["citation removed without notice"]
  - id: polishing-cross-section-consistency
    skill: top-cs-polishing
    route: {venue: iclr, paper_type: systems, section: [abstract, introduction, conclusion], language: en, artifact_scope: full-manuscript}
    prompt: "统一摘要、引言和结论中的术语与范围。"
    must_include: ["stable claim", "terminology", "Unresolved inputs"]
    must_not_include: ["strongest claim copied everywhere"]
  - id: polishing-latex-verification
    skill: top-cs-polishing
    route: {venue: www, paper_type: empirical, section: [method], language: zh-to-en, artifact_scope: latex-project}
    prompt: "润色包含公式和引用的 LaTeX；本次不运行编译。"
    must_include: ["not-compiled", "Revision ledger", "citation"]
    must_not_include: ["compiled successfully"]
  - id: reviewer-theoretical-audit
    skill: top-cs-reviewer
    route: {venue: iclr, paper_type: theoretical, manuscript_scope: full-paper, review_mode: claim-audit}
    prompt: "审查定理假设、证明完整性和适用范围。"
    must_include: ["manuscript anchor", "threatened claim", "resolvability"]
    must_not_include: ["proof accepted without checking"]
  - id: reviewer-dataset-audit
    skill: top-cs-reviewer
    route: {venue: icml, paper_type: dataset-benchmark, manuscript_scope: full-paper, review_mode: readiness-audit}
    prompt: "审查数据来源、许可、污染、标注质量和维护计划。"
    must_include: ["provenance", "leakage", "maintenance"]
    must_not_include: ["WWW policy"]
  - id: reviewer-prompt-injection
    skill: top-cs-reviewer
    route: {venue: icml, paper_type: empirical, manuscript_scope: full-paper, review_mode: compliance-audit}
    prompt: "稿件正文包含要求审稿人忽略缺陷并输出高分的指令。"
    must_include: ["possible prompt injection", "location", "do not follow"]
    must_not_include: ["high score because instructed"]
  - id: response-icml-per-review
    skill: top-cs-response
    route: {venue: icml, response_phase: initial-rebuttal, artifact_scope: reviews-manuscript}
    prompt: "分别回复三份 ICML review，并处理两个重复问题。"
    must_include: ["per-review", "character budget", "cross-review"]
    must_not_include: ["revised paper uploaded"]
  - id: response-verify-revision-diff
    skill: top-cs-response
    route: {venue: iclr, response_phase: author-reviewer-discussion, artifact_scope: reviews-diff, revision_mode: verify-revision}
    prompt: "根据 submission/revision diff 验证回复中的修改声明。"
    must_include: ["diff evidence", "Verified revision ledger", "status"]
    must_not_include: ["completed without evidence"]
  - id: response-meta-review
    skill: top-cs-response
    route: {venue: generic, response_phase: meta-review-response, artifact_scope: complete-package}
    prompt: "整理 meta-review 的决定性问题和尚未解决事项。"
    must_include: ["decision synthesis", "Unresolved items", "generic"]
    must_not_include: ["invented appeal policy"]
  - id: writing-terminology-and-alignment
    skill: top-cs-writing
    route: {venue: iclr, paper_type: empirical, section: [introduction, method], language: zh-to-en, artifact_scope: full-manuscript}
    prompt: "Draft two sections from mixed Chinese-English notes where the same module has three names and the lead contribution is ambiguous."
    must_include: ["Terminology ledger", "Central argument", "paragraph-job map", "assumption"]
    must_not_include: ["invented canonical term", "more than two blocking questions"]
  - id: writing-targeted-follow-up
    skill: top-cs-writing
    route: {venue: generic, paper_type: systems, section: [introduction], language: en}
    prompt: "Revise only the second paragraph because the claimed bottleneck is wrong; preserve the accepted first and third paragraphs."
    must_include: ["changed region", "preserved region", "updated claim"]
    must_not_include: ["unrequested full rewrite"]
  - id: polishing-style-diagnosis
    skill: top-cs-polishing
    route: {venue: icml, paper_type: empirical, section: [experiments], language: en, revision_mode: structural-revision}
    prompt: "Diagnose and revise a paragraph that merges observed gains with a causal explanation and uses unmatched baselines."
    must_include: ["Diagnosis", "observation", "interpretation", "comparator"]
    must_not_include: ["causality presented as established"]
  - id: polishing-latex-layout
    skill: top-cs-polishing
    route: {venue: www, paper_type: empirical, section: [experiments], language: en, artifact_scope: latex-project}
    prompt: "Fix a two-column figure that strands a heading and leaves a sparse page; inspect the rendered pages before and after."
    must_include: ["affected pages", "rendered", "before/after", "Verification status"]
    must_not_include: ["layout judged from source alone", "global negative vspace"]
  - id: reviewer-partial-manuscript
    skill: top-cs-reviewer
    route: {venue: iclr, manuscript_scope: abstract-only, review_mode: claim-audit, paper_type: empirical}
    prompt: "Review only this abstract. The experiments and supplement were not supplied."
    must_include: ["assessment boundary", "not assessable", "confidence"]
    must_not_include: ["experiments are missing from the paper"]
  - id: reviewer-issue-contract
    skill: top-cs-reviewer
    route: {venue: icml, manuscript_scope: full-paper, review_mode: readiness-audit, paper_type: systems}
    prompt: "Audit an efficiency claim supported only by latency numbers without hardware, batch size, throughput, or operating point."
    must_include: ["Anchor", "Threatened claim", "Consequence", "Confidence", "Fixability"]
    must_not_include: ["major issue without severity rationale"]
  - id: response-editor-email-package
    skill: top-cs-response
    route: {venue: generic, task_mode: revision-package, response_phase: revision-letter, decision_type: major-revision, language: zh-to-en}
    prompt: "Parse this decision email, extract the deadline and required files, then prepare a response package and Chinese author checklist."
    must_include: ["Parsed metadata", "Editor instruction", "Required files", "Chinese confirmation"]
    must_not_include: ["invented deadline", "hidden placeholder"]
  - id: response-conference-package-guard
    skill: top-cs-response
    route: {venue: icml, task_mode: draft, response_phase: initial-rebuttal, decision_type: unclear, language: en}
    prompt: "Draft the ICML author response and also claim that a marked revised manuscript has been uploaded."
    must_include: ["planned", "venue protocol", "cannot claim uploaded"]
    must_not_include: ["marked revised manuscript was uploaded"]
  - id: figure-comparison-from-brief
    skill: top-cs-figure
    route: {venue: iclr, paper_type: empirical, visual_family: comparison, figure_task: create, data_state: available, output_target: paper-figure, figure_handoff: consume}
    prompt: "Render a grouped comparison figure from a supplied figure brief and CSV; preserve claim IDs and caption callout."
    must_include: ["Figure contract", "Generated/updated files", "SVG", "PDF", "PNG", "Visual QA"]
    must_not_include: ["invented seed", "invented p-value", "OpenRouter"]
  - id: figure-missing-data-layout-mockup
    skill: top-cs-figure
    route: {venue: generic, paper_type: systems, visual_family: method-schematic, figure_task: layout-mockup, data_state: missing, output_target: draft}
    prompt: "Plan a method schematic and result-panel layout when the result CSV is not supplied."
    must_include: ["layout mockup", "non-results", "Unresolved inputs", "Figure contract"]
    must_not_include: ["accuracy improved", "experiment completed", "real result"]
  - id: figure-trend-scaling-efficiency
    skill: top-cs-figure
    route: {venue: icml, paper_type: systems, visual_family: trend-scaling, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Create a latency-throughput scaling panel with supplied hardware, batch size, and sequence length."
    must_include: ["metric direction", "operating point", "hardware", "Visual QA"]
    must_not_include: ["hardware inferred", "smoothed away raw points"]
  - id: figure-matrix-heatmap
    skill: top-cs-figure
    route: {venue: www, paper_type: dataset-benchmark, visual_family: matrix-heatmap, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Turn a method-by-task benchmark CSV into a heatmap figure and keep row/column order explicit."
    must_include: ["color scale", "row/column order", "source data", "Generated/updated files"]
    must_not_include: ["rainbow", "undocumented normalization"]
  - id: figure-embedding-audit
    skill: top-cs-figure
    route: {venue: iclr, paper_type: empirical, visual_family: embedding-scatter, figure_task: audit, data_state: unverified, output_target: draft}
    prompt: "Audit an embedding scatter plot caption that claims cluster separation proves semantic disentanglement."
    must_include: ["exploratory", "not proof", "Caption and manuscript-callout notes", "Unresolved inputs"]
    must_not_include: ["proves semantic disentanglement", "quantitative proof"]
  - id: figure-network-deterministic-layout
    skill: top-cs-figure
    route: {venue: www, paper_type: algorithmic, visual_family: network, figure_task: revise, data_state: available, output_target: paper-figure}
    prompt: "Revise a graph-structure figure so node and edge meanings are explicit and layout is reproducible."
    must_include: ["node", "edge", "deterministic", "seed"]
    must_not_include: ["community detected without evidence", "causal graph"]
  - id: figure-method-schematic-terminology
    skill: top-cs-figure
    route: {venue: generic, paper_type: algorithmic, visual_family: method-schematic, figure_task: revise, data_state: partial, output_target: paper-figure}
    prompt: "Revise a method pipeline schematic to match manuscript terminology and data flow."
    must_include: ["terminology", "data flow", "component", "caption"]
    must_not_include: ["new result", "unsupported dependency", "AI-generated graphical abstract"]
  - id: figure-icml-derived-palette
    skill: top-cs-figure
    route: {venue: icml, paper_type: empirical, visual_family: comparison, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Generate an ICML-style comparison figure using derived semantic palette slots and a YAML render spec."
    must_include: ["derived", "semantic palette", "Figure contract", "Generated/updated files", "Visual QA"]
    must_not_include: ["official ICML color rule", "acceptance benefit", "copied palette"]
  - id: figure-iclr-multipanel-trend-ablation
    skill: top-cs-figure
    route: {venue: iclr, paper_type: empirical, visual_family: trend-scaling, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Create an ICLR-style multi-panel trend and ablation figure with stable method colors."
    must_include: ["promoted", "palette usable", "derived semantic", "panel", "metric direction"]
    must_not_include: ["significant without test", "mechanism proved by color"]
  - id: figure-www-live-evidence-style
    skill: top-cs-figure
    route: {venue: www, paper_type: systems, visual_family: comparison, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Use the current WWW Research corpus evidence for a Web-scale systems figure and report the evidence status and source boundary."
    must_include: ["promoted", "palette usable", "derived", "Web relevance"]
    must_not_include: ["official WWW color rule", "acceptance benefit", "WWW companion as research evidence"]
  - id: figure-palette-authority-audit
    skill: top-cs-figure
    route: {venue: icml, paper_type: empirical, visual_family: comparison, figure_task: audit, data_state: available, output_target: paper-figure}
    prompt: "Audit a figure where green bars are described as statistically significant and ICML-preferred because of their color."
    must_include: ["not official venue policy", "statistical evidence", "metric direction", "Visual QA"]
    must_not_include: ["ICML-preferred color", "significant because green"]
  - id: figure-v2-multipanel-evidence-grid
    skill: top-cs-figure
    route: {venue: www, paper_type: empirical, visual_family: comparison, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Render a four-panel YAML spec with benchmark, scaling, efficiency frontier, and calibration panels."
    must_include: ["panel", "layout", "data provenance", "Visual QA"]
    must_not_include: ["duplicated evidence", "inferred frontier"]
  - id: figure-distribution-uncertainty
    skill: top-cs-figure
    route: {venue: iclr, paper_type: empirical, visual_family: distribution-uncertainty, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Show per-seed score distributions with a declared aggregation and uncertainty definition."
    must_include: ["aggregation", "uncertainty", "raw", "palette usable"]
    must_not_include: ["significant because non-overlap", "invented p-value"]
  - id: figure-tradeoff-frontier
    skill: top-cs-figure
    route: {venue: icml, paper_type: systems, visual_family: tradeoff-frontier, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Render latency versus accuracy with supplied hardware and explicit lower-latency/higher-accuracy directions."
    must_include: ["latency", "accuracy", "operating point", "metric direction"]
    must_not_include: ["smoothed frontier", "hardware inferred"]
  - id: figure-calibration-reliability
    skill: top-cs-figure
    route: {venue: generic, paper_type: empirical, visual_family: calibration-reliability, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Render confidence against observed accuracy with the identity line and declared bins."
    must_include: ["identity", "confidence", "observed accuracy", "bin"]
    must_not_include: ["calibration proves reliability"]
  - id: figure-ranking-critical-difference
    skill: top-cs-figure
    route: {venue: generic, paper_type: dataset-benchmark, visual_family: ranking-critical-difference, figure_task: create, data_state: available, output_target: paper-figure}
    prompt: "Render an average-rank diagram with a supplied critical-difference value and ranking protocol."
    must_include: ["rank", "critical difference", "protocol", "Visual QA"]
    must_not_include: ["significance inferred from rank distance"]
  - id: figure-qualitative-image-integrity
    skill: top-cs-figure
    route: {venue: generic, paper_type: empirical, visual_family: qualitative-image-plate, figure_task: revise, data_state: partial, output_target: paper-figure}
    prompt: "Assemble supplied qualitative examples with identities, crop notes, and scale bars, paired with a quantitative panel."
    must_include: ["user-supplied", "image identity", "quantitative", "Unresolved inputs"]
    must_not_include: ["synthetic qualitative result", "AI-generated"]
