name: Feature request
description: Propose a new skill, workflow, venue, or public-facing improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What research workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe inputs, outputs, boundaries, and an example request.
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Evidence or official sources
      description: Link official venue rules or redistributable public evidence when applicable.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This proposal does not require committing private or copyrighted source material.
          required: true
