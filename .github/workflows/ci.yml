name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Full validation (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit and acceptance tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate evidence
        run: python scripts/validate_evidence.py --index evidence/derived/corpus-index.yaml --rules evidence/derived/rules.yaml --strict

      - name: Run public figure evaluations
        run: python skills/top-cs-figure/scripts/run_figure_evals.py

  public-quality:
    name: Public docs and lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime and development dependencies
        run: python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint maintained public Python surface
        run: python -m ruff check --select E9,F --ignore E402 scripts/install_skills.py scripts/route_skill.py skills/top-cs-paper-workflow tests/test_public_release.py

      - name: Validate public documentation, links, and path boundary
        run: python -m unittest tests.test_public_release

      - name: Check patch whitespace
        run: git diff --check HEAD^ HEAD

  macos-smoke:
    name: macOS installer and route smoke
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Smoke-test Codex workflow install
        run: |
          python scripts/install_skills.py --host codex --workflow --target "$RUNNER_TEMP/codex-skills"
          python scripts/install_skills.py --host codex --workflow --target "$RUNNER_TEMP/codex-skills" --check

      - name: Smoke-test Claude Code workflow install
        run: |
          python scripts/install_skills.py --host claude --workflow --target "$RUNNER_TEMP/claude-skills"
          python scripts/install_skills.py --host claude --workflow --target "$RUNNER_TEMP/claude-skills" --check

      - name: Smoke-test deterministic route resolution
        run: python scripts/route_skill.py --skill top-cs-writing --format json

      - name: Validate public documentation, links, and path boundary
        run: python -m unittest tests.test_public_release
