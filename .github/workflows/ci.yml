name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit and acceptance tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate evidence
        run: python scripts/validate_evidence.py --index evidence/derived/corpus-index.yaml --rules evidence/derived/rules.yaml --strict

      - name: Run public figure evaluations
        run: python skills/top-cs-figure/scripts/run_figure_evals.py

      - name: Check patch whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check HEAD^ HEAD
