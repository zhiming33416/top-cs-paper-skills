$schema: https://json-schema.org/draft/2020-12/schema
$id: figure-regression-suite.schema.yaml
title: Private Figure Regression Suite
type: object
additionalProperties: false
required: [schema_version, suite_id, privacy, cases]
properties:
  schema_version: {const: 1}
  suite_id: {type: string, minLength: 1}
  privacy:
    type: object
    additionalProperties: false
    required: [anonymized, retain_rendered_artifacts, include_source_paths_in_report]
    properties:
      anonymized: {const: true}
      retain_rendered_artifacts: {const: false}
      include_source_paths_in_report: {const: false}
  cases:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required: [id, spec, expected_panels, expected_formats, thresholds]
      properties:
        id: {type: string, pattern: "^[A-Za-z0-9._-]+$"}
        spec: {type: string, minLength: 1}
        expected_panels: {type: integer, minimum: 1}
        expected_formats:
          type: array
          minItems: 1
          uniqueItems: true
          items: {enum: [svg, pdf, png, tiff]}
        baseline:
          type: object
          additionalProperties: false
          properties:
            png_dhash: {type: string, pattern: "^[0-9a-f]{16}$"}
            normalized_spec_sha256: {type: string, pattern: "^[0-9a-f]{64}$"}
            panel_ids: {type: array, items: {type: string}, uniqueItems: true}
        thresholds:
          type: object
          additionalProperties: false
          required: [max_dhash_distance, minimum_text_pt, minimum_line_width_pt]
          properties:
            max_dhash_distance: {type: integer, minimum: 0, maximum: 64}
            minimum_text_pt: {type: number, minimum: 1}
            minimum_line_width_pt: {type: number, minimum: 0.1}
